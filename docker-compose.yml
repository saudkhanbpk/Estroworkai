

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: estro-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: estro-ai
    volumes:
      - mongodb_data:/data/db
    networks:
      - estro-network

  # Redis (for sessions & pub/sub)
  redis:
    image: redis:7-alpine
    container_name: estro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - estro-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: estro-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/estro-ai?authSource=admin
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      WORKSPACE_BASE_PATH: ${WORKSPACE_BASE_PATH:-/var/workspaces}
      DOCKER_SOCKET: ${DOCKER_SOCKET:-/var/run/docker.sock}
      DOMAIN: ${DOMAIN}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WORKSPACE_BASE_PATH:-/var/workspaces}:/var/workspaces
    depends_on:
      - mongodb
      - redis
    networks:
      - estro-network
      - workspace-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: estro-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${FRONTEND_URL}/api
      NEXT_PUBLIC_WS_URL: ${FRONTEND_URL}/ws
    volumes:
       - /app/node_modules
       - /app/.next
    depends_on:
      - backend
    networks:
      - estro-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: estro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - estro-network
      - workspace-network

volumes:
  mongodb_data:
  redis_data:

networks:
  estro-network:
    driver: bridge
  workspace-network:
    driver: bridge
    name: workspace-network
