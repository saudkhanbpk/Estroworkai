name: Backend CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
  workflow_dispatch:  # Manual trigger

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1

jobs:
  # Job 1: Test
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

  # Job 2: Deploy
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Backend via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Backend - ${{ github.sha }}" \
            --parameters 'commands=[
              "echo \"========================================\"",
              "echo \"  Deploying Backend...\"",
              "echo \"========================================\"",
              "cd /home/ubuntu/estro-ai",
              "git fetch origin",
              "git reset --hard origin/main || git reset --hard origin/master",
              "cd backend",
              "npm ci --production",
              "pm2 restart estro-backend || pm2 start src/index.js --name estro-backend",
              "pm2 save",
              "sleep 3",
              "curl -f http://localhost:5000/api/health && echo \"Backend healthy!\" || echo \"Health check failed\"",
              "echo \"========================================\"",
              "echo \"  Backend Deployment Complete!\"",
              "echo \"========================================\""
            ]' \
            --output text \
            --query "Command.CommandId"
          
          echo "Waiting for command to complete..."
          sleep 30

      - name: Check Deployment Status
        run: |
          # Get the latest command
          COMMAND_ID=$(aws ssm list-commands \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --max-results 1 \
            --query "Commands[0].CommandId" \
            --output text)
          
          # Get command status
          STATUS=$(aws ssm get-command-invocation \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --command-id "$COMMAND_ID" \
            --query "Status" \
            --output text)
          
          echo "Deployment Status: $STATUS"
          
          if [ "$STATUS" == "Success" ]; then
            echo "✅ Backend deployed successfully!"
          else
            echo "❌ Deployment may have issues. Check EC2 logs."
            # Get output for debugging
            aws ssm get-command-invocation \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --command-id "$COMMAND_ID" \
              --query "StandardOutputContent" \
              --output text
          fi
