name: Frontend CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'frontend/**'
  workflow_dispatch:  # Manual trigger

env:
  NODE_VERSION: '20'
  AWS_REGION: me-central-1

jobs:
  # Job 1: Test & Build
  test:
    name: Test & Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://40.172.154.20.nip.io:5000

  # Job 2: Deploy
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Frontend via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Frontend - ${{ github.sha }}" \
            --parameters 'commands=[
              "echo \"========================================\"",
              "echo \"  Deploying Frontend...\"",
              "echo \"========================================\"",
              "cd /home/ubuntu/estro-ai && sudo -u ubuntu git fetch origin",
              "cd /home/ubuntu/estro-ai && sudo -u ubuntu git reset --hard origin/main",
              "cd /home/ubuntu/estro-ai/frontend && sudo -u ubuntu bash -c \"source /home/ubuntu/.nvm/nvm.sh && npm ci\"",
              "cd /home/ubuntu/estro-ai/frontend && sudo -u ubuntu bash -c \"source /home/ubuntu/.nvm/nvm.sh && npm run build\"",
              "sudo -u ubuntu bash -c \"source /home/ubuntu/.nvm/nvm.sh && pm2 delete estro-frontend || true\"",
              "cd /home/ubuntu/estro-ai/frontend && sudo -u ubuntu bash -c \"source /home/ubuntu/.nvm/nvm.sh && pm2 start npm --name estro-frontend -- start\"",
              "sudo -u ubuntu bash -c \"source /home/ubuntu/.nvm/nvm.sh && pm2 save\"",
              "sleep 5",
              "curl -sf http://localhost:3000 && echo \"Frontend healthy!\" || echo \"Health check failed\"",
              "echo \"========================================\"",
              "echo \"  Frontend Deployment Complete!\"",
              "echo \"========================================\""
            ]' \
            --output text \
            --query "Command.CommandId"
          
          echo "Waiting for build and deployment..."
          sleep 90

      - name: Check Deployment Status
        run: |
          # Get the latest command
          COMMAND_ID=$(aws ssm list-commands \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --max-results 1 \
            --query "Commands[0].CommandId" \
            --output text)
          
          # Get command status
          STATUS=$(aws ssm get-command-invocation \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --command-id "$COMMAND_ID" \
            --query "Status" \
            --output text)
          
          echo "Deployment Status: $STATUS"
          
          if [ "$STATUS" == "Success" ]; then
            echo "✅ Frontend deployed successfully!"
          else
            echo "❌ Deployment may have issues. Check EC2 logs."
            # Get output for debugging
            aws ssm get-command-invocation \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --command-id "$COMMAND_ID" \
              --query "StandardOutputContent" \
              --output text
          fi
