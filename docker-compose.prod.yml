version: '3.8'

# ===========================================
# ESTRO AI - Production Docker Compose
# ===========================================
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # ===========================================
  # MongoDB Database
  # ===========================================
  mongodb:
    image: mongo:7
    container_name: estro-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: estro-ai
    volumes:
      - mongodb_data:/data/db
    networks:
      - estro-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================
  # Redis (Sessions & Pub/Sub)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: estro-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - estro-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================
  # Backend API Server
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: estro-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD}@mongodb:27017/estro-ai?authSource=admin
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      WORKSPACE_BASE_PATH: /var/workspaces
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspaces:/var/workspaces
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - estro-network
      - workspace-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================
  # Frontend (Next.js)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:5000}
    container_name: estro-frontend
    restart: always
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - estro-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================
  # Nginx Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: estro-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - estro-network
      - workspace-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Workspace Container Cleanup (cron job)
  # ===========================================
  cleanup:
    image: docker:24-cli
    container_name: estro-cleanup
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspaces:/var/workspaces
    entrypoint: /bin/sh
    command: |
      -c 'while true; do
        echo "Running cleanup at $$(date)"
        # Remove stopped workspace containers older than 24 hours
        docker ps -a --filter "name=workspace-" --filter "status=exited" --format "{{.ID}}" | xargs -r docker rm
        # Remove orphaned workspace directories older than 7 days
        find /var/workspaces -maxdepth 1 -type d -mtime +7 -exec rm -rf {} \; 2>/dev/null || true
        sleep 3600
      done'
    networks:
      - workspace-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  workspaces:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/workspaces

networks:
  estro-network:
    driver: bridge
  workspace-network:
    driver: bridge
    name: workspace-network
