# Nginx configuration for AI IDE Platform
# Handles reverse proxy for workspace previews and API routing

upstream backend {
    server backend:5000;
}

upstream frontend {
    server frontend:3000;
}

# Map for workspace preview routing
map $host $workspace_port {
    default "";
    ~^preview-(?<workspace_id>[a-z0-9]+)\.localhost$ $workspace_id;
}

server {
    listen 80;
    server_name localhost;

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket connections
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}

# Workspace preview server (wildcard subdomain)
server {
    listen 80;
    # Match any domain suffix (supports localhost, nip.io, custom domains)
    server_name ~^preview-(?<workspace_id>[a-z0-9]+)\..+$;

    location / {
        # Proxy to workspace container
        # Container ports are dynamically mapped
        resolver 127.0.0.11 valid=30s;
        set $workspace_container workspace-$workspace_id;
        proxy_pass http://$workspace_container:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
